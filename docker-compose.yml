# docker-compose.yml: Docker Compose configuration for building, running, and validating Privateerr with Gluetun.
#
# Learn more about manual PIA VPN connections here: https://github.com/pia-foss/manual-connections
#

#
# Shared labels applied to local containers.
#
x-privateerr-labels: &privateerr-labels
  - "com.centurylinklabs.watchtower.enable=false"  # Prevent Watchtower from updating this container

#
# Define the services used in this stack.
#
services:
  #
  # Configure the service that generates WireGuard config and Gluetun metadata.
  #
  privateerr:
    # Docker image build and container information
    image: ${PRIVATEERR_IMAGE}:${PRIVATEERR_TAG}     # Set the image name and tag for the container
    build:                                           # Define build context and arguments
      context: docker                                # Directory containing the Dockerfile
      dockerfile: Dockerfile                         # Dockerfile used for building the image
      args:                                          # Arguments passed to the Dockerfile build stage
        ALPINE_TAG: ${ALPINE_TAG}                    # Base Alpine image version
        PIA_BIN_HOME: ${PIA_BIN_HOME}                # Directory where PIA scripts will reside
        PRIVATEERR_BIN_HOME: ${PRIVATEERR_BIN_HOME}  # Directory where helper scripts will reside
        IMAGE_CREATED: ${IMAGE_CREATED}              # OCI image creation timestamp
        IMAGE_REVISION: ${IMAGE_REVISION}            # OCI image source revision
        IMAGE_VERSION: ${PRIVATEERR_TAG}             # OCI image version
    container_name: privateerr-${PRIVATEERR_TAG}     # Container name including the tag
    restart: no                                      # Container will not restart automatically
    network_mode: bridge                             # Use Docker's default bridge network
    hostname: privateerr                             # Set hostname inside the container
    privileged: true                                 # Required for upstream IPv6 sysctl behavior

    # Apply Docker labels to the container
    labels: *privateerr-labels

    # Define the container environment
    environment:
      # PIA manual connection environment variables
      VPN_PROTOCOL: ${PIA_VPN_PROTOCOL}          # VPN type: wireguard or openvpn
      DISABLE_IPV6: ${PIA_DISABLE_IPV6}          # Disable IPv6: yes or no
      DIP_TOKEN: ${PIA_DIP_TOKEN}                # Optional PIA dedicated IP token
      AUTOCONNECT: ${PIA_AUTOCONNECT}            # Auto-select the server with lowest latency
      PIA_CONF_PATH: ${PIA_CONF_PATH}            # Path where WireGuard config will be generated
      PIA_CONNECT: ${PIA_CONNECT}                # Generate config without connecting to VPN
      PIA_PF: ${PIA_PF}                          # Select a port-forwarding-capable region
      PIA_DNS: ${PIA_DNS}                        # Configure DNS settings inside wg0.conf
      PIA_WG_SERVER_NAME: ${PIA_WG_SERVER_NAME}  # Optional generated WireGuard server name fallback
      PIA_USER: ${PIA_USER}                      # PIA account username
      PIA_PASS: ${PIA_PASS}                      # PIA account password

      # Privateerr environment variables
      PRIVATEERR_METADATA_PATH: ${PRIVATEERR_METADATA_PATH}            # Path where metadata will be generated
      PRIVATEERR_HEALTHCHECK_MARKER: ${PRIVATEERR_HEALTHCHECK_MARKER}  # File written after successful generation
      PRIVATEERR_KEEPALIVE: ${PRIVATEERR_KEEPALIVE}                    # Keep the container alive after successful generation
      PRIVATEERR_LOG_PATH: ${PRIVATEERR_LOG_PATH}                      # Privateerr log file path

    # Report healthy after the wrapper finishes successfully
    healthcheck:
      test: ["CMD-SHELL", "test -f \"$${PRIVATEERR_HEALTHCHECK_MARKER}\""]  # Healthy when healthcheck marker file exists
      interval: ${PRIVATEERR_HEALTHCHECK_INTERVAL}                          # Run the check at this interval
      timeout: ${PRIVATEERR_HEALTHCHECK_TIMEOUT}                            # Fail if it exceeds this duration
      start_period: ${PRIVATEERR_HEALTHCHECK_START_PERIOD}                  # Grace period before checks start
      retries: ${PRIVATEERR_HEALTHCHECK_RETRIES}                            # Mark as unhealthy after failures

    # Mount host directories into the container
    volumes:
      - ${PRIVATEERR_GLUETUN_CONFIG_PATH}:/gluetun:rw    # Gluetun config output consumed by Gluetun
      - ${PRIVATEERR_CONFIG_PATH}:/privateerr-config:rw  # Privateerr service config directory

  #
  # Configure the service that runs Gluetun with the generated WireGuard config.
  #
  gluetun:
    # Docker image and container information
    image: ${GLUETUN_IMAGE}:${GLUETUN_TAG}  # Gluetun image used for live VPN validation
    container_name: gluetun-${GLUETUN_TAG}  # Container name including the tag
    restart: no                             # Test stack should not restart forever
    hostname: gluetun                       # Set hostname inside the container

    # Load Privateerr metadata before Gluetun starts
    entrypoint: ["/bin/sh", "${GLUETUN_ENTRYPOINT_WRAPPER}"]

    # Add additional linux capabilities
    cap_add:
      - NET_ADMIN  # Grant network admin capability for VPN and network interface configuration

    # Pass host devices into the container for direct hardware access
    devices:
      - /dev/net/tun:/dev/net/tun  # Allow container to handle encrypted VPN traffic directly

    # Apply Docker labels to the container
    labels: *privateerr-labels

    # Define the container environment
    environment:
      VPN_SERVICE_PROVIDER: ${GLUETUN_VPN_SERVICE_PROVIDER}                                  # Use Gluetun's custom provider for PIA WireGuard
      VPN_TYPE: ${GLUETUN_VPN_TYPE}                                                          # Force WireGuard for validation
      VPN_PORT_FORWARDING: ${GLUETUN_VPN_PORT_FORWARDING}                                    # Enable VPN-side port forwarding
      VPN_PORT_FORWARDING_PROVIDER: ${GLUETUN_VPN_PORT_FORWARDING_PROVIDER}                  # PIA port-forwarding helper
      VPN_PORT_FORWARDING_USERNAME: ${PIA_USER}                                              # PIA username for Gluetun port forwarding
      VPN_PORT_FORWARDING_PASSWORD: ${PIA_PASS}                                              # PIA password for Gluetun port forwarding
      PRIVATEERR_METADATA_PATH: ${PRIVATEERR_METADATA_PATH}                                  # Metadata file generated by Privateerr
      GLUETUN_DEFAULT_ENTRYPOINT: ${GLUETUN_DEFAULT_ENTRYPOINT}                              # Original Gluetun entrypoint
      PRIVATEERR_GLUETUN_METADATA_WAIT_SECONDS: ${PRIVATEERR_GLUETUN_METADATA_WAIT_SECONDS}  # Metadata wait timeout

    # Mount host directories into the container
    volumes:
      - ${GLUETUN_CONFIG_PATH}:/gluetun:rw                               # Gluetun config directory
      - ${GLUETUN_CONFIG_PATH}:/tmp/gluetun:rw                           # Gluetun runtime state directory
      - ${GLUETUN_WRAPPER_SCRIPT_PATH}:${GLUETUN_ENTRYPOINT_WRAPPER}:ro  # Gluetun entrypoint wrapper script

    # Specify container service dependencies
    depends_on:
      privateerr:
        condition: service_healthy  # Wait for Privateerr to generate config and metadata

  #
  # Configure the service that validates Gluetun and port forwarding.
  #
  buccaneerr:
    # Docker image build and container information
    image: ${BUCCANEERR_IMAGE}:${BUCCANEERR_TAG}     # Buccaneerr image name and tag
    build:                                           # Define build context and Dockerfile
      context: test                                  # Directory containing Buccaneerr Dockerfile
      dockerfile: Dockerfile                         # Dockerfile used for validation tools
      args:                                          # Arguments passed to the Buccaneerr image
        ALPINE_TAG: ${ALPINE_TAG}                    # Base Alpine image version
        BUCCANEERR_BIN_HOME: ${BUCCANEERR_BIN_HOME}  # Directory where Buccaneerr scripts will reside
        IMAGE_CREATED: ${IMAGE_CREATED}              # OCI image creation timestamp
        IMAGE_REVISION: ${IMAGE_REVISION}            # OCI image source revision
        IMAGE_VERSION: ${BUCCANEERR_TAG}             # OCI image version
    container_name: buccaneerr-${BUCCANEERR_TAG}     # Buccaneerr container name
    restart: no                                      # Buccaneerr exits with pass/fail status
    network_mode: service:gluetun                    # Test from inside Gluetun's network namespace

    # Apply Docker labels to the container
    labels: *privateerr-labels

    # Define the container environment
    environment:
      BUCCANEERR_CONFIG_PATH: ${BUCCANEERR_CONFIG_PATH}                    # Mounted generated config directory
      BUCCANEERR_GLUETUN_PATH: ${BUCCANEERR_GLUETUN_PATH}                  # Mounted Gluetun state directory
      BUCCANEERR_HEALTH_URL: ${BUCCANEERR_HEALTH_URL}                      # Gluetun unauthenticated health URL
      BUCCANEERR_REQUIRE_PORT_FORWARD: ${BUCCANEERR_REQUIRE_PORT_FORWARD}  # Require port-forwarding success
      BUCCANEERR_LOG_PATH: ${BUCCANEERR_LOG_PATH}                          # Buccaneerr log file path

    # Mount host directories into the container
    volumes:
      - ${BUCCANEERR_CONFIG_PATH_HOST}:/config:ro        # Generated Privateerr outputs
      - ${BUCCANEERR_GLUETUN_PATH_HOST}:/gluetun:ro      # Gluetun state outputs
      - ${BUCCANEERR_CONFIG_HOME}:/buccaneerr-config:rw  # Buccaneerr service config directory

    # Specify container service dependencies
    depends_on:
      gluetun:
        condition: service_healthy  # Wait for Gluetun to report healthy
