name: "Inspect the Boarding Pass 🧪🏴‍☠️"

on:
    pull_request:
        branches:
            - main
        paths:
            - "**"

permissions:
    contents: read

jobs:
    validate-pr:
        name: "Validate the Boarding Pass 🧪"
        runs-on: ubuntu-latest
        permissions:
            contents: read

        env:
            IMAGE_PLATFORMS: linux/amd64,linux/arm64,linux/arm/v7
            PRIVATEERR_LOCAL_IMAGE_REF: ghcr.io/scottgigawatt/privateerr
            BUCCANEERR_LOCAL_IMAGE_REF: ghcr.io/scottgigawatt/buccaneerr

        steps:
            - name: "Grab the Treasure Map 🗺️"
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
              with:
                  submodules: recursive
                  persist-credentials: false

            - name: "Summon Cross-Arch Cannons 🧨"
              uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8  # v4

            - name: "Sharpen the Build Axe 🪓"
              uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

            - name: "Load the Example Cargo 📦"
              run: |
                  cp example.env .env
                  {
                    echo "IMAGE_CREATED=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
                    echo "IMAGE_REVISION=${GITHUB_SHA}"
                  } >> .env

            - name: "Read the Compose Charts 🔎"
              run: docker compose config --quiet

            - name: "Scrub the Deck with Pre-Commit 🧽"
              uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd  # v3.0.1

            - name: "Hammer the Docker Hulls ⚒️"
              run: |
                  make build
                  make build-buccaneerr

            - name: "Test the Three-Deck Hull Plans 🛠️"
              run: make build-multiarch

            - name: "Inspect Privateerr for Bilge Rot 🔍"
              uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
              with:
                  image-ref: ${{ env.PRIVATEERR_LOCAL_IMAGE_REF }}:latest
                  format: table
                  vuln-type: os,library
                  severity: CRITICAL,HIGH
                  ignore-unfixed: true
                  exit-code: 1

            - name: "Inspect Buccaneerr for Bilge Rot 🔍"
              uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
              with:
                  image-ref: ${{ env.BUCCANEERR_LOCAL_IMAGE_REF }}:latest
                  format: table
                  vuln-type: os,library
                  severity: CRITICAL,HIGH
                  ignore-unfixed: true
                  exit-code: 1
