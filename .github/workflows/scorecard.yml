#
# scorecard.yml: Measure and publish Privateerr's supply-chain security posture.
#

name: "Inspect the Crow's Nest 🦜"

#
# Re-evaluate repository policy changes, the weekly schedule, and explicit
# maintainer requests against the current default branch.
#
on:
    branch_protection_rule:
    schedule:
        - cron: "29 8 * * 1"
    workflow_dispatch:

permissions:
    contents: read

jobs:
    #
    # Score repository practices and upload the signed SARIF findings to GitHub
    # code scanning with only the identity and security permissions required.
    #
    scorecard:
        name: "Count the Supply Chain Doubloons 💰"
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
            security-events: write

        steps:
            #
            # Keep credentials out of the checkout before the third-party
            # Scorecard action examines repository history and configuration.
            #
            - name: "Grab the Treasure Map 🗺️"
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
              with:
                  persist-credentials: false

            - name: "Spy the Riggin' for Weak Planks 🔭"
              uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
              with:
                  results_file: scorecard-results.sarif
                  results_format: sarif
                  publish_results: true

            #
            # Upload the generated report so repository-level findings appear
            # beside Privateerr's other GitHub code-scanning alerts.
            #
            - name: "Hoist the Scorecard Scroll 📜"
              uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a  # v4
              with:
                  sarif_file: scorecard-results.sarif
