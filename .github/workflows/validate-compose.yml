name: "Inspect the Compose Charts 🧭"

on:
    push:
        branches:
            - main
        paths:
            - "docker-compose.yml"
            - "example.env"
            - "config/**"
            - ".github/workflows/validate-compose.yml"

jobs:
    validate-docker-compose:
        name: "Check the Sea Charts 🗺️"
        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
            - name: "Grab the Treasure Map 🗺️"
              uses: actions/checkout@v7

            - name: "Read the Compose Charts 🔎"
              run: docker compose config --no-interpolate
