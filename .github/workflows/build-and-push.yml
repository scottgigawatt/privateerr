name: "Hoist the Registry Sails рҹҸҙвҖҚвҳ пёҸ"

on:
    push:
        branches:
            - main
        paths:
            - "docker/**"
            - "test/**"
            - "config/**"
            - "docker-compose.yml"
            - "Makefile"
            - "example.env"
            - ".github/workflows/build-and-push.yml"
    schedule:
        - cron: "17 7 * * 1"
    workflow_dispatch:

jobs:
    build-and-push:
        name: "Pack the Cargo Hold рҹ§°"
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        env:
            REGISTRY: ghcr.io
            IMAGE_NAME: ${{ github.event.repository.name }}
            BUCCANEERR_IMAGE_NAME: buccaneerr
            IMAGE_NAMESPACE: ${{ github.repository_owner }}

        steps:
            - name: "Grab the Treasure Map рҹ—әпёҸ"
              uses: actions/checkout@v7
              with:
                  submodules: recursive

            - name: "Sharpen the Build Axe рҹӘ“"
              uses: docker/setup-buildx-action@v4.1.0

            - name: "Board the GHCR Galleon рҹ”җ"
              uses: docker/login-action@v4.2.0
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: "Ink the Build Scroll рҹ“ң"
              run: |
                  cp example.env .env
                  {
                    echo "PRIVATEERR_IMAGE=${IMAGE_NAME}"
                    echo "BUCCANEERR_IMAGE=${BUCCANEERR_IMAGE_NAME}"
                    echo "IMAGE_CREATED=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
                    echo "IMAGE_REVISION=${GITHUB_SHA}"
                  } >> .env

            - name: "Hammer the Docker Hulls вҡ’пёҸ"
              run: |
                  make build
                  make build-buccaneerr

            - name: "Send the Test Ship to Sea рҹҢҠ"
              env:
                  PIA_USER: ${{ secrets.PIA_USER }}
                  PIA_PASS: ${{ secrets.PIA_PASS }}
              run: |
                  if [ -z "${PIA_USER}" ] || [ -z "${PIA_PASS}" ]; then
                    echo "PIA secrets missing; skipping live e2e voyage."
                    exit 0
                  fi
                  {
                    echo "PIA_USER=${PIA_USER}"
                    echo "PIA_PASS=${PIA_PASS}"
                  } >> .env
                  make test-e2e

            - name: "Swab the Test Deck рҹ§Ҫ"
              if: always()
              run: make test-down

            - name: "Inspect Privateerr for Bilge Rot рҹ”Қ"
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                  image-ref: ${{ env.IMAGE_NAME }}:latest
                  format: table
                  vuln-type: os,library
                  severity: CRITICAL,HIGH
                  ignore-unfixed: true
                  exit-code: 1

            - name: "Inspect Buccaneerr for Bilge Rot рҹ”Қ"
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                  image-ref: ${{ env.BUCCANEERR_IMAGE_NAME }}:latest
                  format: table
                  vuln-type: os,library
                  severity: CRITICAL,HIGH
                  ignore-unfixed: true
                  exit-code: 1

            - name: "Bury the Images in GHCR рҹ’°"
              run: |
                  docker tag ${IMAGE_NAME}:latest ${REGISTRY}/${IMAGE_NAMESPACE}/${IMAGE_NAME}:latest
                  docker tag ${BUCCANEERR_IMAGE_NAME}:latest ${REGISTRY}/${IMAGE_NAMESPACE}/${BUCCANEERR_IMAGE_NAME}:latest
                  docker push ${REGISTRY}/${IMAGE_NAMESPACE}/${IMAGE_NAME}:latest
                  docker push ${REGISTRY}/${IMAGE_NAMESPACE}/${BUCCANEERR_IMAGE_NAME}:latest
